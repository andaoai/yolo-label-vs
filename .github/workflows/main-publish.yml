name: Publish to VS Code Marketplace

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish-to-marketplace:
    runs-on: ubuntu-latest
    # 发布条件:
    # 1. 在 main 分支
    # 2. commit message 不含 [skip ci]
    # 3. commit message 不以 'docs:' 开头 (纯文档更新跳过发布)
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]') && !startsWith(github.event.head_commit.message, 'docs:')
    env:
      # HaaLeo/publish-vscode-extension@v2 仍使用 node20，暂无更新版本
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'

      - name: Get current version
        id: current_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          npm install --no-package-lock --ignore-scripts

      - name: Build extension with webpack (production)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Package extension
        run: |
          npm install -g @vscode/vsce
          vsce package

      - name: Create GitHub Release and Upload VSIX
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.current_version.outputs.version }}
          name: Release v${{ steps.current_version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            New version released to VS Code Marketplace.
            Version: ${{ steps.current_version.outputs.version }}
          files: ./yolo-labeling-vs-${{ steps.current_version.outputs.version }}.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VSCE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
