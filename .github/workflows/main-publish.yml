name: Publish to VS Code Marketplace

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_non_docs_changes: ${{ steps.check.outputs.has_non_docs_changes }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check for non-documentation changes
        id: check
        run: |
          # 获取变更文件列表
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # 检查是否有非 .md 文件变更
          if echo "$CHANGED_FILES" | grep -qv "\.md$"; then
            echo "has_non_docs_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Found code/configuration changes, will proceed with publish"
          else
            echo "has_non_docs_changes=false" >> $GITHUB_OUTPUT
            echo "📝 Only documentation (.md) files changed, will skip publish"
          fi

  publish-to-marketplace:
    needs: check-changes
    runs-on: ubuntu-latest
    # 发布条件:
    # 1. 在 main 分支
    # 2. commit message 不含 [skip ci]
    # 3. 存在非文档变更（即不是纯文档更新）
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]') && needs.check-changes.outputs.has_non_docs_changes == 'true'
    env:
      # HaaLeo/publish-vscode-extension@v2 仍使用 node20，暂无更新版本
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'

      - name: Get current version
        id: current_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          npm install --no-package-lock --ignore-scripts

      - name: Build extension with webpack (production)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Package extension
        run: |
          npm install -g @vscode/vsce
          vsce package

      - name: Create GitHub Release and Upload VSIX
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.current_version.outputs.version }}
          name: Release v${{ steps.current_version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            New version released to VS Code Marketplace.
            Version: ${{ steps.current_version.outputs.version }}
          files: ./yolo-labeling-vs-${{ steps.current_version.outputs.version }}.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VSCE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
