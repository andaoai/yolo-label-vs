name: Update Version for Dev Branch

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths-ignore:
      - 'package.json'

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    # 版本更新条件:
    # 1. 在 dev 分支
    # 2. commit message 不含 [skip ci]
    # 3. commit message 不以 'docs:' 开头 (纯文档更新跳过版本递增)
    if: github.ref == 'refs/heads/dev' && !contains(github.event.head_commit.message, '[skip ci]') && !startsWith(github.event.head_commit.message, 'docs:')
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
      
      - name: Get current version
        id: current_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        
      - name: Bump patch version (third number)
        id: new_version
        run: |
          CURRENT=${{ steps.current_version.outputs.version }}
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEWPATCH=$((PATCH + 1))
          NEWVERSION="$MAJOR.$MINOR.$NEWPATCH"
          echo "version=$NEWVERSION" >> $GITHUB_OUTPUT
          
      - name: Update package.json version
        run: |
          npm version ${{ steps.new_version.outputs.version }} --no-git-tag-version

      - name: Update README badges
        run: |
          NEWVERSION=${{ steps.new_version.outputs.version }}
          # Update version badge in README.md (English)
          sed -i "s|VS_Marketplace-v[0-9]*\.[0-9]*\.[0-9]*-blue|VS_Marketplace-v${NEWVERSION}-blue|g" README.md
          # Update version badge in docs/README_CN.md (Chinese)
          sed -i "s|VS_Marketplace-v[0-9]*\.[0-9]*\.[0-9]*-blue|VS_Marketplace-v${NEWVERSION}-blue|g" docs/README_CN.md
          echo "Updated README badges to version $NEWVERSION"

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add package.json README.md docs/README_CN.md
          git commit -m "Bump patch version to ${{ steps.new_version.outputs.version }} for dev release [skip ci]"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
          git push
      
      - name: Delete package-lock.json and install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-package-lock --ignore-scripts
        
      - name: Build extension with webpack (development)
        run: npm run build:dev
        
      - name: Package extension
        run: |
          npm install -g @vscode/vsce
          vsce package