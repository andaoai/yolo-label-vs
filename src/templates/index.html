<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO Labeling</title>
    <link rel="stylesheet" href="index.css">
</head>
<body tabindex="0">
    <!-- Minimum size overlay -->
    <div class="min-size-overlay">
        <div class="min-size-message">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M4 5h16M4 19h16M2 9h20M2 15h20"/>
                <rect x="6" y="7" width="12" height="10" rx="1"/>
            </svg>
            <h3>Window too small</h3>
            <p>Please enlarge the window to use annotation</p>
            <p class="min-size-hint">Minimum recommended size: 650 × 500</p>
        </div>
    </div>
    <div class="container">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
            <nav class="nav-buttons">
                <button id="prevImage" title="Previous Image (A)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
                <button id="nextImage" title="Next Image (D)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18l6-6-6-6"/>
                    </svg>
                </button>
            </nav>
            <div class="file-actions">
                <button id="openImageTab" title="Open image in new tab">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                </button>
                <button id="openTxtTab" title="Open text file in new tab">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </button>
            </div>
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="imageSearch" placeholder="Search images..." autocomplete="off" title="Search images (Use ↑/↓ to navigate, Enter to select)">
                    <div id="searchResults" class="search-results"></div>
                </div>
            </div>
            <div class="right-controls">
                <div class="mode-selector">
                    <div class="segmented-control" id="modeControl">
                        <button id="boxMode" class="segmented-button active" data-mode="box" title="Box labeling mode">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <circle cx="3" cy="3" r="1.2" fill="currentColor"/>
                                <circle cx="21" cy="3" r="1.2" fill="currentColor"/>
                                <circle cx="21" cy="21" r="1.2" fill="currentColor"/>
                                <circle cx="3" cy="21" r="1.2" fill="currentColor"/>
                            </svg>
                        </button>
                        <button id="segMode" class="segmented-button" data-mode="seg" title="Segmentation labeling mode">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/>
                                <circle cx="12" cy="2" r="1.2" fill="currentColor"/>
                                <circle cx="22" cy="8.5" r="1.2" fill="currentColor"/>
                                <circle cx="22" cy="15.5" r="1.2" fill="currentColor"/>
                                <circle cx="12" cy="22" r="1.2" fill="currentColor"/>
                                <circle cx="2" cy="15.5" r="1.2" fill="currentColor"/>
                                <circle cx="2" cy="8.5" r="1.2" fill="currentColor"/>
                            </svg>
                        </button>
                        <button id="poseMode" class="segmented-button" data-mode="pose" title="Pose/Keypoint labeling mode">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="5" r="2"/>
                                <path d="M12 7v5"/>
                                <path d="M6 10l6-2 6 2"/>
                                <path d="M12 12l-3 7M12 12l3 7"/>
                                <circle cx="6" cy="10" r="1" fill="currentColor"/>
                                <circle cx="18" cy="10" r="1" fill="currentColor"/>
                                <circle cx="9" cy="19" r="1" fill="currentColor"/>
                                <circle cx="15" cy="19" r="1" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button class="toggle-button" id="toggleLabels" title="Toggle labels visibility">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                        <rect x="16" y="3" width="5" height="5" rx="1"/>
                    </svg>
                </button>
                <button id="undoButton" class="secondary" title="Undo (Ctrl+Z)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="1 4 1 10 7 10"></polyline>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                    </svg>
                </button>
                <button id="clearAllLabels" class="secondary" title="Clear all labels on current image">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
                <button id="saveLabels" class="secondary" title="Save Labels (Ctrl+S)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                </button>
            </div>
        </header>
        <!-- 进度条 -->
        <div class="progress-container">
            <div class="progress-bar" id="imageProgressBar"></div>
            <div id="progressPreview" class="progress-preview" style="display:none;">
                <img id="progressPreviewImg" class="progress-preview-img" />
                <span id="progressPreviewText" class="progress-preview-text"></span>
            </div>
        </div>
        <!-- 主体内容区 -->
        <main class="main-content">
            <!-- 画布区 -->
            <section class="canvas-container">
                <canvas id="imageCanvas" title="Mouse wheel: Scroll | Ctrl+Wheel: Zoom | Alt+Drag: Pan"></canvas>
            </section>
            <!-- 侧边栏 -->
            <aside class="sidebar">
                <!-- Class 选择器（可折叠） -->
                <section class="sidebar-section collapsible" id="classSection">
                    <div class="section-header" id="classHeader">
                        <span class="section-toggle">▶</span>
                        <span class="section-title">Class: <strong id="className">person</strong></span>
                        <span class="section-badge" id="classBadge">1/9</span>
                    </div>
                    <div class="section-body" id="classBody" style="display: none;">
                        <input type="text" id="classSearch" class="class-search-input" placeholder="Filter classes..." autocomplete="off">
                        <div class="class-grid" id="classGrid"></div>
                    </div>
                </section>
                <!-- Model 推理面板（可折叠） -->
                <section class="sidebar-section collapsible" id="modelSection">
                    <div class="section-header" id="modelHeader">
                        <span class="section-toggle">▶</span>
                        <span class="section-title">YOLO Inference</span>
                        <span class="section-badge" id="modelBadge">-</span>
                    </div>
                    <div class="section-body" id="modelBody" style="display: none;"></div>
                </section>
                <!-- Labels 列表（可折叠） -->
                <section class="sidebar-section collapsible" id="labelSection">
                    <div class="section-header" id="labelHeader">
                        <span class="section-toggle">▼</span>
                        <span class="section-title">Labels</span>
                        <span class="section-badge" id="labelCount">0</span>
                    </div>
                    <div class="section-body" id="labelBody">
                        <div class="label-list" id="labelList"></div>
                    </div>
                </section>
            </aside>
        </main>
        <!-- 状态栏 -->
        <footer class="status-bar">
            <span id="subsetInfo" class="subset-info"></span>
            <span id="imageInfo">Image: - of -</span>
            <span class="divider">|</span>
            <span id="image-dimension">Size: - × -</span>
            <span class="divider">|</span>
            <span id="labels-count">Labels: 0</span>
            <span class="divider">|</span>
            <span id="zoom-info">Zoom: 100%</span>
            <span class="divider">|</span>
            <span id="coordinates">Position: - , -</span>
            <span class="divider">|</span>
            <span class="shortcuts-info">Ctrl+Wheel = Zoom | Alt+Drag = Pan</span>
            <div class="support-links">
                <a href="https://github.com/andaoai/yolo-label-vs" target="_blank" class="star-link" title="Star on GitHub">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                    <span>Star</span>
                </a>
                <span class="divider">|</span>
                <a href="https://github.com/andaoai/yolo-label-vs#sponsorship" target="_blank" class="sponsor-link" title="Sponsor">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                    <span>Sponsor</span>
                </a>
            </div>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
